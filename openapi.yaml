openapi: 3.0.0
info:
  version: 1.1.2022090801
  title: GigaLogistics API
  termsOfService: https://platform.gigacloudlogistics.com/docs/
  contact:
    name: GigaLogistics Sales & Support
    email: sa-support@gigacloudtech.com
    url: https://platform.gigacloudlogistics.com/docs/
  x-logo:
    url: >-
      http://ar-logistics-hk-prod.oss-cn-hongkong.aliyuncs.com/logistics-parent/openapi/DJYClogo1.png
  description: "This is an **example** API to demonstrate features of the OpenAPI specification.\r\n\r\n# Getting Started\r\n\r\nThis API definition is intended to to be a good starting point for\r\ndescribing your API in \r\n\r\n[OpenAPI/Swagger\r\nformat](https://github.com/OAI/OpenAPI-Specification/blob/master/versions/3.0.2.md).\r\n\r\nIt also demonstrates features of the\r\n[create-openapi-repo](https://github.com/Redocly/create-openapi-repo) tool\r\nand \r\n\r\nthe [Redoc](https://github.com/Redocly/Redoc) documentation engine. Beyond\r\nthe standard OpenAPI syntax, we use a few \r\n\r\n[vendor\r\nextensions](https://github.com/Redocly/Redoc/blob/master/docs/redoc-vendor-extensions.md).\r\n\r\n# Authentication\r\n\r\nTo authenticate yourself to GIGALOGISTICS, you need to include an `Authorization`\r\nheader in each API call. If you don't include a key when making an API\r\nrequest, or if you use an incorrect or expired key, then GIGALOGISTICS will\r\nrespond with a `401 Unauthorized` error.<br>\r\n<br>\r\nLearn more about API keys in our [authentication\r\nguide](https://platform.gigacloudlogistics.com/docs/guide/other/guide-to-reading.html)."
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
tags:
  - name: Carriers
    description: carriers
  - name: Carrier Accounts
    description: carrier accounts
  - name: Rates
    description: rates
  - name: Shipments
    description: >-
      Shipments are at the center of the GIGALOGISTICS API. A shipment is the
      first step in creating a shipping label, or creating a manifest. It's also
      essential for getting shipping rates.
  - name: Tracking
    description: tracking
  - name: LTL
    description: Ltl shipping.
  - name: Warehouses
    description: warehouses
servers:
  - url: http://sit.gateway.orsd.tech/gw
    description: Sandbox Server
  - url: https://prod.com
    description: Production Server
paths:
  /cloud-boot-manager/v1/carriers:
    get:
      tags:
        - Carriers
      summary: List Carriers
      description: List all carriers that have been added to this account.
      operationId: listCarrier
      security: []
      parameters:
        - $ref: '#/components/parameters/Authorization'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarrierResp'
        '401':
          description: Unauthorized
  /cloud-boot-manager/v1/carriers/{carrierId}:
    get:
      tags:
        - Carriers
      summary: Get Carrier By ID
      description: Retrive carrier info by ID
      operationId: getCarrierById
      security: []
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - name: carrierId
          in: path
          description: Carrier ID
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 25
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Carrier'
        '401':
          description: Unauthorized
  /cloud-boot-manager/v1/carrier/{carrierId}/options:
    get:
      tags:
        - Carriers
      summary: Get Carrier Options
      description: Get a list of the options available for the carrier
      operationId: getCarrierOptionById
      security: []
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - name: carrierId
          in: path
          description: Carrier ID
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 25
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                description: AN array of carrier options
                items:
                  $ref: '#/components/schemas/Option'
        '401':
          description: Unauthorized
  /cloud-boot-manager/v1/carrier/{carrierId}/packages:
    get:
      tags:
        - Carriers
      summary: List Carrier Package Types
      description: List the package types associated with the carrier
      operationId: getCarrierPackageById
      security: []
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - name: carrierId
          in: path
          description: Carrier ID
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 25
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                description: AN array of carrier options
                items:
                  $ref: '#/components/schemas/Package'
        '401':
          description: Unauthorized
  /cloud-boot-manager/v1/carrier/{carrierId}/services:
    get:
      tags:
        - Carriers
      summary: List Carrier Services
      description: List the services associated with the carrier ID
      operationId: getCarrierServiceById
      security: []
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - name: carrierId
          in: path
          description: Carrier ID
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 25
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                description: AN array of carrier options
                items:
                  $ref: '#/components/schemas/Service'
        '401':
          description: Unauthorized
  /cloud-ship-service/v1/shipment:
    post:
      tags:
        - Shipments
      summary: Create Shipments
      description: >-
        Shipments are at the center of the LogisticsParent API. A shipment is
        the first step in creating a shipping label, or creating a manifest.
        It's also essential for getting shipping rates.
      operationId: createShipment
      security: []
      parameters:
        - $ref: '#/components/parameters/Authorization'
        - name: transactionId
          in: header
          required: true
          schema:
            description: >-
              This element allows you to assign a unique identifier to your
              transaction. This element is also returned in the reply and helps
              you match the request to the reply.
            type: string
            minLength: 1
            maxLength: 50
            example: XXXX_XXX123XXXXX
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/create_shipments_request_body'
      responses:
        '200':
          description: The requested object creation was a success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResp'
        '207':
          description: The request was partially successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartSuccessResp'
        '400':
          description: The request contained verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'
        '500':
          description: Failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResp'
  /cloud-ship-service/v1/shipment/cancel:
    put:
      tags:
        - Shipments
      summary: Cancel a shipment
      description: >-
        Mark a shipment cancelled, if it is no longer needed or being used by
        your organized.
      operationId: cancelShipment
      security: []
      parameters:
        - $ref: '#/components/parameters/Authorization'
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/cencel_shipments_request_body'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResp'
        '401':
          description: Unauthorized
  /cloud-boot-manager/v1/warehouse:
    get:
      tags:
        - Warehouses
      summary: List Warehouses
      description: Retrieve a list of warehouses associated with this account.
      operationId: listWarehouses
      security: []
      parameters:
        - $ref: '#/components/parameters/Authorization'
      responses:
        '200':
          description: The request was a success.
          content:
            application/json:
              schema:
                type: object
                title: list_warehouses_response_body
                description: A warehouse list response body
                properties:
                  warehouses:
                    description: The array of warehouses returned by the API call
                    type: array
                    items:
                      $ref: '#/components/schemas/Warehouse'
        '401':
          description: Unauthorized
    post:
      tags:
        - Warehouses
      summary: Create Warehouse
      description: >-
        Create a warehouse location that you can use to create shipping items by
        simply passing in the generated warehouse id. If the return address is
        not supplied in the request body then it is assumed that the origin
        address is the return address as well
      operationId: createWarehouse
      security: []
      parameters:
        - $ref: '#/components/parameters/Authorization'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAndUpdateReq'
        description: requestBody description
        required: true
      responses:
        '200':
          description: The request was a success.
          content:
            application/json:
              schema:
                type: object
                title: list_warehouses_response_body
                description: A warehouse list response body
                properties:
                  warehouses:
                    description: The array of warehouses returned by the API call
                    type: array
                    items:
                      $ref: '#/components/schemas/Warehouse'
        '401':
          description: Unauthorized
  /cloud-boot-manager/v1/warehouse/{warehouseId}:
    parameters:
      - name: warehouseId
        in: path
        description: Warehouse ID
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 25
    get:
      tags:
        - Warehouses
      summary: Get Warehouse By Id
      description: |
        Retrieve warehouse data based on the warehouse ID
      operationId: getWarehouseById
      security: []
      parameters:
        - $ref: '#/components/parameters/Authorization'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehouse'
        '403':
          description: Forbidden
          $ref: '#/components/responses/Problem'
        '404':
          description: User not found
          $ref: '#/components/responses/Problem'
    put:
      tags:
        - Warehouses
      summary: Update WareHouse By Id
      description: |
        Update Warehouse object information
      operationId: updateWarehouseById
      security: []
      parameters:
        - $ref: '#/components/parameters/Authorization'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAndUpdateReq'
        description: requestBody description
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehouse'
        '403':
          description: Forbidden
          $ref: '#/components/responses/Problem'
        '404':
          description: User not found
          $ref: '#/components/responses/Problem'
    delete:
      tags:
        - Warehouses
      summary: Delete Warehouse By ID
      description: |
        Delete a warehouse by ID
      operationId: removeWarehouseById
      security: []
      parameters:
        - $ref: '#/components/parameters/Authorization'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: boolean
        '401':
          description: Unauthorized
        '404':
          description: User not found
          $ref: '#/components/responses/Problem'
components:
  parameters:
    Authorization:
      name: Authorization
      in: header
      required: true
      schema:
        type: string
        description: >-
          Example: `Bearer XXX` <br> This indicates the
          [authorization](http://127.0.0.1:8080/#section/Authentication) token
          for the input request.
  schemas:
    Service:
      type: object
      properties:
        carrierId:
          description: A string that uniquely identifies the carrier
          type: string
          minLength: 1
          maxLength: 25
          example: auto_fund_not_supported
        carrierCode:
          description: >-
            A string that uniquely identifies a GIGALOGISTICS resource, such as
            a carrier, label, shipment, etc.
          type: string
          minLength: 1
          maxLength: 25
          example: Body of request cannot be null.
        serviceCode:
          description: service code
          type: string
          minLength: 1
          example: test01
        name:
          description: User friendly service name
          type: string
          minLength: 1
          example: test
        domestic:
          description: Supports domestic shipping
          type: boolean
          example: false
        international:
          description: Supports international shipping.
          type: boolean
          example: false
        isMultiPackageSupported:
          description: Carrier supports multiple packages per shipment
          type: boolean
          example: false
    CarrierDimensions:
      type: object
      properties:
        unit:
          description: The dimension units that are supported by GigaLogistics.
          type: string
          enum:
            - CM
            - IN
          example: CM
        length:
          description: The length of the package, in the specified unit
          type: number
          format: double
          minLength: 0
          example: 0
        width:
          description: The width of the package, in the specified unit
          type: number
          format: double
          minLength: 0
          example: 0
        height:
          description: The length of the package, in the specified unit
          type: number
          format: double
          minLength: 0
          example: 0
      required:
        - unit
        - length
        - width
        - height
    Package:
      type: object
      properties:
        packageId:
          description: A string that uniquely identifies the package.
          type: string
          minLength: 1
          maxLength: 25
          example: test
        packageCode:
          description: A package type
          type: string
          minLength: 1
          example: large_package
        name:
          description: name
          type: string
          minLength: 1
          example: test
        dimensions:
          description: An error message associated with the failed API call
          $ref: '#/components/schemas/CarrierDimensions'
        description:
          description: Provides a helpful description for the custom package.
          type: string
          example: remark
      required:
        - packageCode
        - name
    Option:
      type: object
      properties:
        name:
          description: Name of advanced option
          type: string
          minLength: 1
          example: COD
        defaultValue:
          description: Default value of option
          type: string
          minLength: 1
          example: COD
        description:
          description: Description of option
          type: string
          minLength: 0
          example: remark
      required:
        - errorCode
        - message
    Carrier:
      type: object
      properties:
        carrierId:
          description: A string that uniquely identifies the carrier.
          type: string
          minLength: 1
          maxLength: 25
          example: se-28529731
        carrierCode:
          description: A string that uniquely identifies the carrier.
          type: string
          minLength: 1
          maxLength: 25
          example: se-28529731
        accountNumber:
          description: The account number that the carrier is connected to.
          type: string
          minLength: 1
          example: account_570827
        requiresFundedAmount:
          description: Indicates whether the carrier requires funding to use its services
          type: boolean
          example: false
        balance:
          description: Current available balance
          type: number
          format: double
          minLength: 0
          example: 1.23
        nickname:
          description: Nickname given to the account when initially setting up the carrier.
          type: string
          minLength: 1
          example: name
        friendlyName:
          description: Screen readable name
          type: string
          minLength: 1
          example: name
        primary:
          description: >-
            Is this the primary carrier that is used by default when no carrier
            is specified in label/shipment creation
          type: boolean
          example: false
        hasMultiPackageSupportingServices:
          description: Carrier supports multiple packages per shipment
          type: boolean
          example: false
        supportsLabelMessages:
          description: The carrier supports adding custom label messages to an order.
          type: boolean
          example: false
        services:
          description: A list of services that are offered by the carrier
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/Service'
        packages:
          description: A list of package types that are supported by the carrier
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/Package'
        options:
          description: A list of options that are available to that carrier
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/Option'
    CarrierError:
      type: object
      properties:
        errorCode:
          description: The error code specified for the failed API Call
          type: string
          minLength: 1
          example: auto_fund_not_supported
        message:
          description: An error message associated with the failed API call
          type: string
          minLength: 1
          example: Body of request cannot be null.
      required:
        - errorCode
        - message
    CarrierResp:
      type: object
      properties:
        carriers:
          description: The carrier response body
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/Carrier'
        requestId:
          description: >-
            A UUID that uniquely identifies the request id. This can be given to
            the support team to help debug non-trivial issues that may occur
          type: string
          minLength: 1
          example: aa3d8e8e-462b-4476-9618-72db7f7b7009
        errors:
          description: The errors associated with the failed API call
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/CarrierError'
      required:
        - carriers
        - requestId
        - errors
    contact:
      type: object
      properties:
        personName:
          description: The name of a contact person at this address.
          type: string
          maxLength: 35
          example: 1 Collection Point Name (Test 1)
        phoneNumber:
          description: >-
            The phone number of a contact person at this address. The format of
            this phone number varies depending on the country.
          type: string
          maxLength: 25
          x-nullable: true
          example: 1234-123456789
        companyName:
          description: Specify contact company name. Maximum length is 35.
          type: string
          maxLength: 35
          x-nullable: true
          example: 1 Collection Point Name (Test 1)
        emailAddress:
          description: Specify contact email address. Maximum length is 40.
          type: string
          maxLength: 40
          x-nullable: true
          example: TEST@TEST.COM
      required:
        - personName
    address:
      type: object
      properties:
        countryCode:
          description: This is the two-letter country code.
          type: string
          minLength: 2
          maxLength: 2
          example: GB
        stateOrProvinceCode:
          description: This is a placeholder for state or province code.
          type: string
          maxLength: 35
          example: TEST
        city:
          description: The name of city, town of the recipient.Max length is 35.
          type: string
          maxLength: 35
          example: 155 COLLECTION TOWN
        zipCode:
          description: This is the postal code.
          type: string
          maxLength: 10
          example: SL7 1TB
        streetLine1:
          description: >-
            This is the combination of number, street name, etc. Maximum length
            per line is 35.
          type: string
          maxLength: 35
          example: 155 COLLECTION STREET 1
        streetLine2:
          description: >-
            his is the combination of number, street name, etc. Maximum length
            per line is 35.
          type: string
          maxLength: 35
          example: TEST
          x-nullable: true
        addressType:
          description: Indicate this address type
          type: string
          enum:
            - RESIDENTIAL
            - BUSINESS
            - PARCELSHOP
          example: RESIDENTIAL
          x-nullable: true
      required:
        - countryCode
        - stateOrProvinceCode
        - city
        - zipCode
        - streetLine1
    addressAndConcat:
      type: object
      properties:
        contact:
          description: Indicate the contact details for this shipment.
          allOf:
            - $ref: '#/components/schemas/contact'
        address:
          description: This is detailed information on physical location.
          allOf:
            - $ref: '#/components/schemas/address'
      required:
        - contact
        - address
    payor:
      type: object
      properties:
        contact:
          description: This is detailed information on physical location.
          allOf:
            - $ref: '#/components/schemas/contact'
        address:
          description: Indicate the contact details for this shipment.
          allOf:
            - $ref: '#/components/schemas/address'
        accountNumber:
          type: string
          description: This field is used to bill shipping costs to a third party.
      required:
        - accountNumber
    payment_options:
      type: object
      properties:
        paymentType:
          type: string
          enum:
            - SENDER
            - RECIPIENT
            - THIRD_PARTY
            - COLLECT
          description: |-
            Specifies the payment Type.

             > **Note**: The payment type `COLLECT` is applicable only for FedEx Ground shipments.
          externalDocs:
            url: >-
              https://platform.gigacloudlogistics.com/docs/guide/other/guide-to-reading.html
            description: Find more info here
        payor:
          type: object
          allOf:
            - $ref: '#/components/schemas/payor'
          description: >-
            Payor is mandatory when the paymentType is `RECIPIENT`,
            `THIRD_PARTY` or `COLLECT`.
      required:
        - contact
        - address
    gg_id:
      title: ''
      type: string
      minLength: 1
      maxLength: 25
      pattern: ^se(-[a-z0-9]+)+$
      example: se-28529731
      description: >-
        A string that uniquely identifies a GIGALOGISTICS resource, such as a
        carrier, label, shipment, etc.
    signature_option_fedex:
      type: object
      properties:
        signatureOption:
          description: |-
            Valid Values:

             - `ADULT`: Adult signature required, at recipient address.

             - `DIRECT`: Signature required, at recipient address.

             - `INDIRECT`: Signature required, alternate address is accepted.This option is available for residential deliveries only

             - `NO_SIGNATURE_REQUIRED`: Signature is not required.

             - `SERVICE_DEFAULT`: Signature handled as per current Service Guide.
          type: string
          enum:
            - NO_SIGNATURE_REQUIRED
            - SERVICE_DEFAULT
            - INDIRECT
            - DIRECT
            - ADULT
          example: DIRECT
    signature_option_gel:
      type: object
      properties:
        signatureOption:
          description: Signing service type
          type: string
          enum:
            - NO_SIGNATURE_REQUIRED
            - DIRECT
          example: NO_SIGNATURE_REQUIRED
          default: DIRECT
    signature_option_evri:
      type: object
      properties:
        signatureOption:
          description: Signing service type
          type: string
          enum:
            - NO_SIGNATURE_REQUIRED
            - DIRECT
          default: NO_SIGNATURE_REQUIRED
          example: NO_SIGNATURE_REQUIRED
    LabelSpecification_fedex:
      type: object
      discriminator:
        propertyName: imageType
        mapping:
          PNG: '#/components/schemas/fedex_png_pdf'
          PDF: '#/components/schemas/fedex_png_pdf'
          ZPLII: '#/components/schemas/fedex_zplii_epl2'
          EPL2: '#/components/schemas/fedex_zplii_epl2'
      properties:
        imageType:
          description: Specify the image format used for a shipping document.
          type: string
          enum:
            - PNG
            - PDF
            - ZPLII
            - EPL2
          example: PDF
      required:
        - imageType
    fedex_png_pdf:
      type: object
      description: Indicate the label stock type used.
      allOf:
        - $ref: '#/components/schemas/LabelSpecification_fedex'
        - type: object
          properties:
            labelStockType:
              type: string
              example: PAPER_4X6
              enum:
                - PAPER_4X6
                - PAPER_4X675
                - PAPER_4X8
                - PAPER_4X9
                - PAPER_7X475
                - PAPER_85X11_BOTTOM_HALF_LABEL
                - PAPER_85X11_TOP_HALF_LABEL
                - PAPER_LETTER
      required:
        - labelStockType
    fedex_zplii_epl2:
      type: object
      description: Indicate the label stock type used.
      allOf:
        - $ref: '#/components/schemas/LabelSpecification_fedex'
        - type: object
          properties:
            labelStockType:
              type: string
              example: STOCK_4X6
              enum:
                - STOCK_4X6
                - STOCK_4X675
                - STOCK_4X675_LEADING_DOC_TAB
                - STOCK_4X675_TRAILING_DOC_TAB
                - STOCK_4X8
                - STOCK_4X9
                - STOCK_4X9_LEADING_DOC_TAB
                - STOCK_4X9_TRAILING_DOC_TAB
                - STOCK_4X85_TRAILING_DOC_TAB
                - STOCK_4X105_TRAILING_DOC_TAB
      required:
        - labelStockType
    LabelSpecification_gel:
      type: object
      properties:
        imageType:
          description: Specify the image format used for a shipping document.
          type: string
          enum:
            - PDF
          example: PDF
      required:
        - imageType
    LabelSpecification_gls:
      type: object
      discriminator:
