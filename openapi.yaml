        width:
          description: Indicate the width of the package.
          type: number
          format: double
          minLength: 1
          example: 8.23
        height:
          description: Indicate the height of the package.
          type: number
          format: double
          minLength: 1
          example: 9.24
      required:
        - length
        - width
        - height
        - unit
    special_service:
      type: object
      description: >-
        These are special services that are available at the package level for
        some or all service types.
      properties:
        specialServiceTypes:
          description: Indicate the types of special services requested for the shipment.
          externalDocs:
            description: Find more info here
            url: >-
              https://platform.gigacloudlogistics.com/docs/guide/other/guide-to-reading.html
          type: array
          items:
            type: string
            enum:
              - DANGEROUS_GOODS
