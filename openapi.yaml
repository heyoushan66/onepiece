    CustomerAddress:
      type: object
      description: customer address info
      properties:
        id:
          type: integer
          minLength: 1
          description: unique id
        name:
          type: string
          description: >-
            The name of a contact person at this address. This field may be set
            instead of - or in addition to - the `companyName` field.
          minLength: 1
          maxLength: 25
          example: CA1
        phone:
          type: string
          minLength: 1
          maxLength: 25
          description: >-
            The phone number of a contact person at this address. The format of
            this phone number varies depending on the country.
          example: 123456789
        companyName:
          type: string
          description: >-
            If this is a business address, then the company name should be
            specified here.
          x-nullable: true
          example: John Doe
        addressLine1:
          type: string
          minLength: 1
          description: >-
            The first line of the street address. For some addresses, this may
            be the only line. Other addresses may require 2 or 3 lines.
          example: 1999 Bishop Grandin Blvd.
        addressLine2:
          type: string
          description: >-
            The second line of the street address.  For some addresses, this
            line may not be needed.
          example: Unit 408.
          nullable: true
        addressLine3:
          type: string
          description: >-
            The third line of the street address.  For some addresses, this line
            may not be needed.
          nullable: true
          example: 'Building #7'
        cityLocality:
          type: string
          minLength: 1
          description: The name of the city or locality
          example: Winnipeg
        stateProvince:
          type: string
          minLength: 1
          description: >-
            The state or province.  For some countries (including the U.S.) only
            abbreviations are allowed.  Other countries allow the full name or
            abbreviation.
          example: Manitoba
        postalCode:
          type: string
          minLength: 1
          example: '56234'
          description: postal code
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
          description: >-
            The two-letter [country
            code](https://platform.gigacloudlogistics.com/docs/guide/api-reference/country-code.html)
          example: US
        addressResidentialIndicator:
          type: string
          enum:
            - unknown
            - 'yes'
            - 'no'
          default: unknown
          description: Indicates whether this is a residential address.
          example: 'yes'
      required:
        - id
        - name
        - phone
        - addressLine1
        - cityLocality
        - stateProvince
        - postalCode
        - countryCode
        - addressResidentialIndicator
