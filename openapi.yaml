    CustomerReference:
      type: object
      description: >-
        Custom messages to print on the shipping label for the package. These
        are typically used to print invoice numbers, product numbers, or other
        internal reference numbers. Not all carriers support label messages. The
        number of lines and the maximum length of each line also varies by
        carrier.
      properties:
        ref1:
          type: string
          minLength: 1
          example: RB1-UB-20220221-18853
        ref2:
          type: string
          minLength: 1
          example: W44616989
        ref3:
          type: string
          minLength: 1
          example: W44616989
        ref4:
          type: string
          minLength: 1
          example: W44616989
        ref5:
          type: string
          minLength: 1
          example: W44616989
    ItemLine:
      type: object
      properties:
        itemTransactionId:
          description: >-
            This element allows you to assign a unique identifier to your
            package. This element is also returned in the reply and helps you
            match the request to the reply.
          type: string
          minLength: 1
          maxLength: 50
          example: test-xxxx-xxxxxxxx
        packageCode:
          type: string
          default: CUSTOM_PACKAGE
          description: >-
            The package type, such as `THICK_ENVELOPE`, `SMALL_FLAT_RATE_BOX`,
            `LARGE_PACKAGE`, etc. The code `CUSTOM_PACKAGE` indicates a custom
            or unknown package type.
          externalDocs:
            description: Find more info here
            url: >-
              https://platform.gigacloudlogistics.com/docs/guide/other/guide-to-reading.html
        itemCode:
          description: sku
          type: string
          minLength: 1
          example: TEST
        weight:
          allOf:
            - $ref: '#/components/schemas/Weight'
          description: These are the package weight details.
        dimensions:
          allOf:
            - $ref: '#/components/schemas/Dimensions'
          description: |-
            Indicate the dimensions of the package.

             - Dimensions are optional but when added, then all three dimensions must be indicated.
             - Dimensions are required with `CUSTOM_PACKAGE` package type.
        declaredValue:
          type: object
          description: >-
            This is the Declared Value of any shipment.This is including, but
            not limited to any loss, damage, delay, misdelivery, any failure to
            provide information, or misdelivery of information related to the
            Shipment.
          properties:
            currency:
              type: string
              enum:
                - USD
                - EUR
                - JPY
                - GBP
              description: The currencies that are supported by GIGALOGISTICS.
            amount:
              type: number
              minimum: 0
              description: The monetary amount, in the specified currency.
        specialService:
          allOf:
            - $ref: '#/components/schemas/special_service'
        customerReference:
          allOf:
            - $ref: '#/components/schemas/CustomerReference'
          description: >-
            This is a customer reference type. The value specified here for the
            element is printed on the Commercial Invoice only for tracking and
            label information.
          externalDocs:
            url: >-
              https://platform.gigacloudlogistics.com/docs/guide/shipping-labels/custom-label-messages.html
            description: Find more info here
      required:
        - itemTransactionId
        - itemCode
        - weight
    tax_indentifiers:
      type: object
      title: ''
      additionalProperties: false
      properties:
        taxableEntityType:
          title: taxable_entity_type
          type: string
          enum:
            - SHIPPER
            - RECIPIENT
          description: >
            The taxable entity type for this tax item. Valid values include the
            following.

             | Value     | Description 
             |---------|----------------
             |`SHIPPER`  |  The shipper is responsible for this tax.    
              |`RECIPIENT`  | The recipient of the shipment is responsible for this tax.
        identifierType:
          title: identifier_type
          type: string
          enum:
            - VAT
            - EORI
            - SSN
            - EIN
            - TIN
            - IOSS
            - PAN
            - VOEC
          description: |
            The carrier service used to ship the package.

             |Identifier Type     | Service Name 
             |---------|----------------
             |`VAT`  |  The tax identifier is a Value Added Tax.
              |`EORI`  | The tax identifier is an Economic Operators Registration and Identification Number (EORI).
             |`SSN`  | The tax identifier is a Social Security Number.
             |`EIN` | The tax identifier is an Employer Identification Number (EIN).
             |`TIN` | The tax identifier is a Tax Identification Number (TIN).
             |`IOSS`    | The tax identifier is an Import One-Stop Shop (IOSS).  
             |`PAN`  | The tax identifier is a Permanent Account Number (PAN).
             |`VOEC`  | The tax identifier is a Norwegian VAT On E-Commerce(VOEC).
        issuingAuthority:
          type: string
          description: >-
            The authority that issued this tax. This must be a valid 2 character
            [country
            code](https://platform.gigacloudlogistics.com/docs/guide/api-reference/country-code.html).
        value:
          type: string
          description: The value of the identifier
      required:
        - taxableEntityType
        - identifierType
        - issuing_authority
        - value
    create_shipments_request_body:
      type: object
      properties:
        carrierId:
          description: The carrier account that is billed for the shipping charges.
          type: string
          minLength: 1
          example: John
        serviceType:
          description: >-
            The carrier service used to ship the package, such as
            `FEDEX_GROUND`, etc.
          externalDocs:
            description: Find more info here
            url: >-
              https://platform.gigacloudlogistics.com/docs/guide/shipping/specify-carrier-service.html
          type: string
        shipper:
          allOf:
            - $ref: '#/components/schemas/addressAndConcat'
          description: >-
            The shipment's origin address. If you frequently ship from the same 
            , consider creating a warehouse. Then you can simply specify the
            `warehouseId` rather than the complete address each time.

             > **Note:** Either `warehouseId` or `shipper` must be specified.
        recipient:
          description: The recipient's mailing address
          allOf:
            - $ref: '#/components/schemas/addressAndConcat'
        paymentOption:
          description: >-
            Specifies the payment details specifying the method and means of
            payment to carrier for providing shipping services.
          allOf:
            - $ref: '#/components/schemas/payment_options'
        warehouseId:
          type: string
          default: null
          allOf:
            - $ref: '#/components/schemas/gg_id'
          description: >-
            The
            [warehouse](https://platform.gigacloudlogistics.com/docs/guide/other/guide-to-reading.html)
            that the shipment is being shipped from. 
        returnAddress:
          type: object
          description: >-
            The return address for this shipment. Defaults to the `shipper`
            address.
          allOf:
            - $ref: '#/components/schemas/addressAndConcat'
        signatureOption:
          type: object
          description: Indicate the Signature Type.
          oneOf:
            - $ref: '#/components/schemas/signature_option_fedex'
            - $ref: '#/components/schemas/signature_option_gel'
            - $ref: '#/components/schemas/signature_option_evri'
        labelSpecification:
          oneOf:
            - $ref: '#/components/schemas/LabelSpecification_fedex'
            - $ref: '#/components/schemas/LabelSpecification_gel'
            - $ref: '#/components/schemas/LabelSpecification_gls'
            - $ref: '#/components/schemas/LabelSpecification_whistl'
        itemLines:
          type: array
          description: The packages in the shipment.
          items:
            allOf:
              - $ref: '#/components/schemas/ItemLine'
        taxIndentifiers:
          type: array
          items:
            allOf:
              - $ref: '#/components/schemas/tax_indentifiers'
      required:
        - transactionId
        - carrierId
        - serviceType
        - recipient
        - itemLines
    PackageDoc:
      type: object
      properties:
